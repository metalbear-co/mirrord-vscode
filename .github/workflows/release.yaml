name: Release
on:
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:

jobs:
  validate_release_request:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.validate.outputs.should_release }}
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          # Avoid persisting GITHUB_TOKEN credentials in release jobs.
          persist-credentials: false
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Validate release trigger and version
        id: validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          version="$(jq -r '.version' package.json)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ github.event.pull_request.merged }}" != "true" ]; then
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            case "${{ github.event.pull_request.head.ref }}" in
              release/*|releases/*)
                ;;
              *)
                echo "should_release=false" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
            esac
          fi

          release_status_code=$(
            curl -sS \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -o /tmp/release-check.json \
              -w "%{http_code}" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${version}"
          )

          if [ "${release_status_code}" = "200" ]; then
            echo "Version ${version} is already released."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${release_status_code}" != "404" ]; then
            cat /tmp/release-check.json
            exit 1
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"

  release:
    needs: validate_release_request
    if: github.event_name == 'workflow_dispatch' || needs.validate_release_request.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          # Avoid persisting GITHUB_TOKEN credentials in release jobs.
          persist-credentials: false
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Get release version
        # VSCode doesn't support pre release versions https://github.com/microsoft/vsmarketplace/issues/50#issuecomment-990764201
        run: |
          echo "version=$(cat package.json | jq -r '.version')" >> $GITHUB_OUTPUT
        id: version
      - run: npm install -g vsce ovsx typescript esbuild
      - run: mkdir -p /tmp/vscode-ext
      - run: |
          npm install
          tsc && vsce package -o /tmp/vscode-ext
      - name: Publish vscode-ext to VSCode Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish -i /tmp/vscode-ext/mirrord-${{ steps.version.outputs.version }}.vsix 
      - name: Publish vscode-ext to Open VSX Registry
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: ovsx publish /tmp/vscode-ext/mirrord-${{ steps.version.outputs.version }}.vsix
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: vscode-ext
          path: /tmp/vscode-ext/mirrord-${{ steps.version.outputs.version }}.vsix
          if-no-files-found: error

  release_gh:
    needs: [validate_release_request, release]
    runs-on: ubuntu-24.04
    if: needs.validate_release_request.outputs.should_release == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          # Avoid persisting GITHUB_TOKEN credentials in release jobs.
          persist-credentials: false
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vscode-ext
          path: /tmp/release
      - uses: metalbear-co/action-zip@0852c26906e00f8a315c704958823928d8018b28 # default branch HEAD
      - name: Create app token for release publishing
        id: app_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.CUBBY_CLIENT_ID }}
          private-key: ${{ secrets.CUBBY_PRIVATE_KEY }}
          permission-contents: write
      - name: Prepare release notes
        run: |
          set -euo pipefail

          version='${{ needs.release.outputs.version }}'

          awk -v version="${version}" '
            $0 ~ "^## \\[" version "\\]" { in_section=1; next }
            in_section && $0 ~ "^## \\[" { exit }
            in_section { print }
          ' CHANGELOG.md > /tmp/release-notes.md

      # Consider to add changelog generation..
      - name: Release
        uses: metalbear-co/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # default branch HEAD
        with:
          body_path: /tmp/release-notes.md
          tag_name: ${{ needs.release.outputs.version }}
          target_commitish: ${{ github.sha }}
          token: ${{ steps.app_token.outputs.token }}
          files: /tmp/release/**

  update_latest:
    runs-on: ubuntu-24.04
    needs: [validate_release_request, release_gh]
    if: needs.validate_release_request.outputs.should_release == 'true'
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          # Avoid persisting GITHUB_TOKEN credentials in release jobs.
          persist-credentials: false
          # Get complete history
          fetch-depth: 0

      - name: Create app token for tag updates
        id: app_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.CUBBY_CLIENT_ID }}
          private-key: ${{ secrets.CUBBY_PRIVATE_KEY }}
          permission-contents: write

      - name: Update major version and latest tags
        uses: metalbear-co/release-tracker-action@419810f4dfc58850fb70c8cb908ec66df1e377e5 # default branch HEAD
        env:
          # GitHub App token to enable pushing tags
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
        with:
          # Move "latest" tag
          update-latest: true
          # Don't update the vX.Y tags
          update-minor: false

  update_infra_vscode_version:
    runs-on: ubuntu-24.04
    needs: [validate_release_request, release, update_latest]
    if: needs.validate_release_request.outputs.should_release == 'true'
    steps:
      - name: Create app token for infra workflow dispatch
        id: app_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.CUBBY_CLIENT_ID }}
          private-key: ${{ secrets.CUBBY_PRIVATE_KEY }}
          owner: metalbear-co
          repositories: infra
          permission-actions: write

      - name: Dispatch infra update-vscode-version workflow
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail

          gh api \
            --method POST \
            repos/metalbear-co/infra/actions/workflows/update-vscode-version.yml/dispatches \
            -f ref=main \
            -f inputs[vscode_version]=${{ needs.release.outputs.version }}
