name: Release
on:
  push:
    branches:
      - main
    paths:
      - CHANGELOG.md
      - package.json
      - package-lock.json
  # Running from workflow dispatch (AKA manual) will not publish anything.
  # This is intended for testing changes to this flow.
  workflow_dispatch:

jobs:
  check_release_commit:
    runs-on: ubuntu-24.04
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Check whether the last commit is a release commit
        id: check
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files=$(
            jq -r '
              [
                (.head_commit.added // []),
                (.head_commit.modified // []),
                (.head_commit.removed // [])
              ]
              | add
              | .[]
            ' "$GITHUB_EVENT_PATH"
          )

          required_files=("CHANGELOG.md" "package.json" "package-lock.json")

          for required_file in "${required_files[@]}"; do
            if ! grep -Fxq "${required_file}" <<< "${changed_files}"; then
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "should_release=true" >> "$GITHUB_OUTPUT"

  release:
    needs: check_release_commit
    if: needs.check_release_commit.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: metalbear-co/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # default branch HEAD
        with:
          # this might remove tools that are actually needed,
          # if set to "true", frees about 6 GB
          tool-cache: false

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Get release version
        # VSCode doesn't support pre release versions https://github.com/microsoft/vsmarketplace/issues/50#issuecomment-990764201
        run: |
          echo "version=$(cat package.json | jq -r '.version')" >> $GITHUB_OUTPUT
        id: version
      - run: npm install -g vsce ovsx typescript esbuild
      - run: mkdir -p /tmp/vscode-ext
      - run: |
          npm install
          tsc && vsce package -o /tmp/vscode-ext
      - name: Publish vscode-ext to VSCode Marketplace
        if: github.event_name != 'workflow_dispatch'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish -i /tmp/vscode-ext/mirrord-${{ steps.version.outputs.version }}.vsix 
      - name: Publish vscode-ext to Open VSX Registry
        if: github.event_name != 'workflow_dispatch'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: ovsx publish /tmp/vscode-ext/mirrord-${{ steps.version.outputs.version }}.vsix
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: vscode-ext
          path: |
            /tmp/vscode-ext
          if-no-files-found: error

  release_gh:
    needs: [check_release_commit, release]
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_dispatch' && needs.check_release_commit.outputs.should_release == 'true'
    permissions:
      packages: write
      contents: write
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/artifacts
      - uses: metalbear-co/action-zip@0852c26906e00f8a315c704958823928d8018b28 # default branch HEAD
      - name: Prepare binaries for upload
        run: |
          mkdir /tmp/release
          mv /tmp/artifacts/vscode-ext/* /tmp/release/

      # Consider to add changelog generation..
      - name: Release
        uses: metalbear-co/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # default branch HEAD
        with:
          tag_name: ${{ needs.release.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: /tmp/release/**

  update_latest:
    runs-on: ubuntu-24.04
    needs: [check_release_commit, release_gh]
    if: github.event_name != 'workflow_dispatch' && needs.check_release_commit.outputs.should_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          # Get complete history
          fetch-depth: 0

      - name: Update major version and latest tags
        uses: metalbear-co/release-tracker-action@419810f4dfc58850fb70c8cb908ec66df1e377e5 # default branch HEAD
        env:
          # GitHub token to enable pushing tags
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Move "latest" tag
          update-latest: true
          # Don't update the vX.Y tags
          update-minor: false

  update_infra_vscode_version:
    runs-on: ubuntu-24.04
    needs: [check_release_commit, release, update_latest]
    if: github.event_name != 'workflow_dispatch' && needs.check_release_commit.outputs.should_release == 'true'
    steps:
      - name: Verify infra workflow token is configured
        env:
          INFRA_GITHUB_TOKEN: ${{ secrets.INFRA_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${INFRA_GITHUB_TOKEN}" ]; then
            echo "INFRA_GITHUB_TOKEN secret is required to dispatch metalbear-co/infra workflow."
            exit 1
          fi

      - name: Dispatch infra update-vscode-version workflow
        env:
          GH_TOKEN: ${{ secrets.INFRA_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh api \
            --method POST \
            repos/metalbear-co/infra/actions/workflows/update-vscode-version.yml/dispatches \
            -f ref=main \
            -f inputs[vscode_version]=${{ needs.release.outputs.version }}
