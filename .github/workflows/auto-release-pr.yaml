name: Auto Release PR

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  create_release_pr:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          # Avoid persisting GITHUB_TOKEN credentials; pushes must use the app token instead.
          persist-credentials: false
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6

      - name: Install Python
        run: uv python install

      - name: Create virtual environment
        run: uv venv

      - name: Install towncrier
        run: uv pip install towncrier==23.11.0

      - name: Determine next release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          fragments=(changelog.d/*.md)
          if [ ${#fragments[@]} -eq 0 ]; then
            echo "No changelog entries found in changelog.d"
            exit 1
          fi

          bump_level=patch
          for fragment in "${fragments[@]}"; do
            category=$(basename "${fragment}")
            category="${category%.md}"
            category="${category##*.}"

            case "${category}" in
              internal|fixed)
                ;;
              *)
                bump_level=minor
                break
                ;;
            esac
          done

          {
            echo "bump_level=${bump_level}"
          } >> "${GITHUB_OUTPUT}"

      - name: Bump package version
        id: bump
        run: |
          set -euo pipefail

          npm version "${{ steps.version.outputs.bump_level }}" --no-git-tag-version
          echo "new_version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: uv run towncrier build --draft --version "${{ steps.bump.outputs.new_version }}" > /tmp/release-notes.md

      - name: Generate changelog
        run: uv run towncrier build --yes --version "${{ steps.bump.outputs.new_version }}"

      - name: Create app token for release PR updates
        id: app_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.CUBBY_CLIENT_ID }}
          private-key: ${{ secrets.CUBBY_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Create or update release pull request
        env:
          APP_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${APP_TOKEN}" ]; then
            echo "GitHub App token is required to push the release branch and open the PR."
            exit 1
          fi

          branch="releases/${{ steps.bump.outputs.new_version }}"
          title="Release ${{ steps.bump.outputs.new_version }}"
          body_file=$(mktemp)

          {
            cat <<EOF
          Automated release preparation for \`${{ steps.bump.outputs.new_version }}\`.

          This PR updates:
          - \`package.json\`
          - \`package-lock.json\`
          - \`CHANGELOG.md\`
          - consumed \`changelog.d\` entries

          Draft release notes:

          EOF
            cat /tmp/release-notes.md
          } > "${body_file}"

          git config user.name "cubby-mb[bot]"
          git config user.email "273354325+cubby-mb[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No release changes to commit."
            exit 0
          fi

          git checkout -B "${branch}"
          git add package.json package-lock.json CHANGELOG.md changelog.d
          git commit -m "Prepare release ${{ steps.bump.outputs.new_version }}"
          # Use an app token so PR opened/synchronize events trigger CI normally.
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force-with-lease --set-upstream origin "${branch}"

          existing_pr_url=$(
            gh pr list \
              --head "${branch}" \
              --base main \
              --state open \
              --json url \
              --jq '.[0].url'
          )

          if [ -n "${existing_pr_url}" ]; then
            gh pr edit "${existing_pr_url}" --title "${title}" --body-file "${body_file}"
          else
            gh pr create \
              --base main \
              --head "${branch}" \
              --title "${title}" \
              --body-file "${body_file}"
          fi
